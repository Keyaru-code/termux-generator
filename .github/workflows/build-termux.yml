name: Build Termux Bootstrap with OpenJDK Dependencies

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Package name"
        required: false
        default: "com.vault.fide"
      arch:
        description: "Architecture (aarch64, arm, i686, x86_64)"
        required: false
        default: "aarch64"
      extra_packages:
        description: "Extra packages (comma-separated, e.g., p7zip,git,axel)"
        required: false
        default: "p7zip,git,axel"

jobs:
  build-bootstrap:
    runs-on: ubuntu-24.04
    steps:
      - name: Clone termux-generator (with retries)
        run: |
          for i in {1..5}; do
            echo "Attempt $i: cloning termux-generator..."
            git clone --depth 1 https://github.com/robertkirkman/termux-generator.git . && break
            sleep 30
          done

      - name: Build bootstrap with dependencies
        run: |
          # Combine required dependencies + user extra packages
          ALL_PACKAGES="libandroid-shmem,libandroid-spawn,libiconv,libjpeg-turbo,zlib,littlecms,alsa-lib"
          if [ -n "${{ github.event.inputs.extra_packages }}" ]; then
            ALL_PACKAGES="$ALL_PACKAGES,${{ github.event.inputs.extra_packages }}"
          fi
          ./build-termux.sh \
            --name "${{ github.event.inputs.name }}" \
            --add "$ALL_PACKAGES" \
            --architectures "${{ github.event.inputs.arch }}" \
            --disable-terminal \
            --disable-tasker \
            --disable-float \
            --disable-widget \
            --disable-api \
            --disable-boot \
            --disable-styling \
            --disable-gui \
            --disable-x11 \
            --disable-bootstrap-second-stage

      - name: Upload bootstrap zip
        uses: actions/upload-artifact@v4.6.0
        with:
          name: termux-bootstrap-${{ github.event.inputs.arch }}-with-deps
          path: ./bootstrap-*.zip
