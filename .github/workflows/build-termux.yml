name: Build Termux Bootstrap Only (Fast)

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Package name"
        required: false
        default: "com.vault.fide"
      add:
        description: "Additional packages (comma-separated)"
        required: false
        default: "openjdk-21,p7zip,git,axel"
      arch:
        description: "Architecture (single for speed)"
        required: false
        default: "aarch64"

jobs:
  build-bootstrap:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout termux-generator
        uses: actions/checkout@v4
        with:
          repository: robertkirkman/termux-generator
          ref: master

      - name: Build bootstrap only (no APKs, no X11, single arch)
        run: |
          ./build-termux.sh \
            --name "${{ github.event.inputs.name }}" \
            --add "${{ github.event.inputs.add }}" \
            --architectures "${{ github.event.inputs.arch }}" \
            --disable-terminal \
            --disable-tasker \
            --disable-float \
            --disable-widget \
            --disable-api \
            --disable-boot \
            --disable-styling \
            --disable-gui \
            --disable-x11 \
            --disable-bootstrap-second-stage

      - name: Upload bootstrap zip
        uses: actions/upload-artifact@v4.6.0
        with:
          name: termux-bootstrap-${{ github.event.inputs.arch }}
          path: ./bootstrap-*.zip
