name: Build Termux Bootstrap Only

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Package name (default: com.vault.fide)"
        required: false
        default: "com.vault.fide"
      add:
        description: "Additional packages (default: openjdk-21,p7zip,git,axel)"
        required: false
        default: "openjdk-21,p7zip,git,axel,which,file,find"
      architectures:
        description: "Architectures (default: aarch64)"
        required: false
        default: "aarch64"

jobs:
  build-bootstrap:
    runs-on: ubuntu-24.04
    steps:
      - name: Clone termux-generator
        uses: actions/checkout@v4
        with:
          repository: robertkirkman/termux-generator
          ref: master

      - name: Build bootstrap only (no APKs)
        run: |
          ./build-termux.sh \
            --name "${{ github.event.inputs.name }}" \
            --add "${{ github.event.inputs.add }}" \
            --architectures "${{ github.event.inputs.architectures }}" \
            --disable-terminal \
            --disable-tasker \
            --disable-float \
            --disable-widget \
            --disable-api \
            --disable-boot \
            --disable-styling \
            --disable-gui \
            --disable-x11

      - name: Upload bootstrap zip
        uses: actions/upload-artifact@v4.6.0
        with:
          name: termux-bootstrap-${{ github.event.inputs.architectures }}
          path: |
            ./bootstrap-*.zip
